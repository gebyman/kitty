<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>電報</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255,255,255,0.1);
      --border: rgba(255,255,255,0.16);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #f59e0b;
      --accent-2: #38bdf8;
      --danger: #fb7185;
      --ok: #34d399;
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .main {
      padding: 28px;
    }

    .sidebar {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 40px);
    }

    .sub {
      color: var(--muted);
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    button, select, input {
      font: inherit;
    }

    button, select {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: transform .15s ease, opacity .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-primary { background: var(--accent); color: #111827; }
    .btn-secondary { background: rgba(255,255,255,0.12); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: rgba(251,113,133,0.18); color: #ffd5dd; border: 1px solid rgba(251,113,133,0.35); }
    .btn-ok { background: rgba(52,211,153,0.18); color: #d1fae5; border: 1px solid rgba(52,211,153,0.35); }

    .quiz-box {
      padding: 28px;
      border-radius: 24px;
      background: rgba(15,23,42,0.45);
      border: 1px solid var(--border);
    }

    .label {
      color: #fcd34d;
      font-size: 14px;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .question {
      font-size: clamp(36px, 7vw, 68px);
      font-weight: 800;
      line-height: 1.05;
      margin: 8px 0 18px;
      word-break: break-word;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }

    .answer-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .answer-input {
      flex: 1;
      min-width: 240px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 26px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .answer-input::placeholder { color: #94a3b8; letter-spacing: 0; }

    .feedback {
      min-height: 30px;
      font-size: 18px;
      margin: 10px 0 6px;
      font-weight: 700;
    }

    .feedback.ok { color: var(--ok); }
    .feedback.bad { color: #fecdd3; }
    .answer-reveal {
      color: #fde68a;
      min-height: 24px;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat {
      background: rgba(15,23,42,0.5);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .stat .num {
      font-size: 28px;
      font-weight: 800;
      margin-top: 6px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
      padding-right: 4px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(15,23,42,0.45);
      border: 1px solid var(--border);
    }

    .item strong { display: block; font-size: 16px; }
    .item small { color: var(--muted); }

    .mini-btn {
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      white-space: nowrap;
    }

    .muted { color: var(--muted); }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .main, .sidebar { padding: 20px; }
      .quiz-box { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card main">
      <h1>電報</h1>
      <div class="sub">題目會顯示英文解釋，你輸入對應電報代碼。答對會自動跳下一題，答錯會記錄到不熟清單。資料會自動存到瀏覽器。</div>

      <div class="toolbar">
        <select id="modeSelect">
          <option value="random">全部隨機</option>
          <option value="weak">只練不熟題</option>
          <option value="manual">只練手動加入的不熟題</option>
        </select>
        <button class="btn-secondary" id="nextBtn">下一題</button>
        <button class="btn-secondary" id="showAnswerBtn">顯示答案</button>
        <button class="btn-danger" id="markWeakBtn">加入不熟</button>
        <button class="btn-secondary" id="resetStatsBtn">清除紀錄</button>
      </div>

      <div class="quiz-box">
        <div class="label">Question</div>
        <div class="question" id="questionText">About</div>
        <div class="meta">
          <div class="pill">總題數：<span id="totalCount">0</span></div>
          <div class="pill">目前模式：<span id="modeText">全部隨機</span></div>
        </div>

        <div class="answer-row">
          <input id="answerInput" class="answer-input" type="text" placeholder="請輸入代碼，例如 ABT" autocomplete="off" />
          <button class="btn-primary" id="submitBtn">送出</button>
        </div>

        <div class="feedback" id="feedback"></div>
        <div class="answer-reveal" id="answerReveal"></div>
      </div>
    </section>

    <aside class="card sidebar">
      <div>
        <div class="section-title">練習統計</div>
        <div class="stats">
          <div class="stat"><div class="muted">答對</div><div class="num" id="correctCount">0</div></div>
          <div class="stat"><div class="muted">答錯</div><div class="num" id="wrongCount">0</div></div>
          <div class="stat"><div class="muted">手動不熟</div><div class="num" id="manualWeakCount">0</div></div>
          <div class="stat"><div class="muted">系統判定不熟</div><div class="num" id="systemWeakCount">0</div></div>
        </div>
      </div>

      <div>
        <div class="section-title">不熟題目</div>
        <div class="list" id="weakList"></div>
      </div>
    </aside>
  </div>

  <script>
    const DATA = [
      { code: 'ABT', explanation: 'About' },
      { code: 'ABVL', explanation: 'Available' },
      { code: 'ACPT', explanation: 'Accept' },
      { code: 'ADV', explanation: 'Advise' },
      { code: 'APT', explanation: 'Airport' },
      { code: 'ATTN', explanation: 'Attention' },
      { code: 'BDG', explanation: 'Boarding' },
      { code: 'CIQ', explanation: 'Customs, Immigration and Quarantine' },
      { code: 'CFM', explanation: 'Confirm' },
      { code: 'CFY', explanation: 'Clarify' },
      { code: 'CPY', explanation: 'Copy' },
      { code: 'DZEND', explanation: 'This End' },
      { code: 'DLY', explanation: 'Delay' },
      { code: 'DOC', explanation: 'Document' },
      { code: 'ENVLP', explanation: 'Envelope' },
      { code: 'EQP', explanation: 'Equipment' },
      { code: 'FWD', explanation: 'Forward' },
      { code: 'HDL', explanation: 'Handle' },
      { code: 'HTL', explanation: 'Hotel' },
      { code: 'INF', explanation: 'Infant' },
      { code: 'MAAS', explanation: 'Meet On Arvl & Asst' },
      { code: 'MGR', explanation: 'Manager' },
      { code: 'NEG', explanation: 'Negative' },
      { code: 'NIL', explanation: 'None, Nothing' },
      { code: 'OFC', explanation: 'Office' },
      { code: 'PLZ', explanation: 'Please' },
      { code: 'RSVN', explanation: 'Reservation' },
      { code: 'RGDS', explanation: 'Regards' },
      { code: 'RE', explanation: 'Regarding' },
      { code: 'SPVR', explanation: 'Supervisor' },
      { code: 'ABV', explanation: 'Above' },
      { code: 'ACRDGLY', explanation: 'Accordingly' },
      { code: 'ACT', explanation: 'Action' },
      { code: 'ASAP', explanation: 'As Soon As Possible' },
      { code: 'AGT', explanation: 'Agent' },
      { code: 'ARR', explanation: 'Arrive' },
      { code: 'BSCT', explanation: 'Bassinet' },
      { code: 'BKG', explanation: 'Booking' },
      { code: 'CNXL', explanation: 'Cancel' },
      { code: 'CGO', explanation: 'Cargo' },
      { code: 'CTR', explanation: 'Counter' },
      { code: 'DGR', explanation: 'Danger' },
      { code: 'DEP', explanation: 'Departure' },
      { code: 'EFF', explanation: 'Effective' },
      { code: 'ETA', explanation: 'Estimated Time of Arrival' },
      { code: 'FLT', explanation: 'Flight' },
      { code: 'FYI', explanation: 'For Your Information' },
      { code: 'HLDG', explanation: 'Holding' },
      { code: 'INTL', explanation: 'International' },
      { code: 'ISO', explanation: 'Instead Of' },
      { code: 'M/A', explanation: 'Meet And Assist' },
      { code: 'MNFST', explanation: 'Manifest' },
      { code: 'NOSH', explanation: 'No Shown' },
      { code: 'OFLD', explanation: 'Offload' },
      { code: 'OVBK', explanation: 'Overbook' },
      { code: 'PTY', explanation: 'Party' },
      { code: 'RCVD', explanation: 'Received' },
      { code: 'RQ', explanation: 'Request' },
      { code: 'SHUD', explanation: 'Should' },
      { code: 'SVC', explanation: 'Service' },
      { code: 'SOP', explanation: 'Standard Operation Procedure' },
      { code: 'SRY', explanation: 'Sorry' },
      { code: 'TKNO', explanation: 'Ticket Number' },
      { code: 'TRBL', explanation: 'Trouble' },
      { code: 'UGT', explanation: 'Urgent' },
      { code: 'WT', explanation: 'With' },
      { code: 'YR', explanation: 'Your' },
      { code: 'ACC', explanation: 'According' },
      { code: 'ACK', explanation: 'Acknowledge' },
      { code: 'ADS', explanation: 'Address' },
      { code: 'ASST', explanation: 'Assistance' },
      { code: 'BTW', explanation: 'Between' },
      { code: 'CPN', explanation: 'Coupon' },
      { code: 'CAPT', explanation: 'Captain' },
      { code: 'CMA', explanation: 'Comma' },
      { code: 'CTC', explanation: 'Contact' },
      { code: 'DUPE', explanation: 'Duplicate Message' },
      { code: 'DEST', explanation: 'Destination' },
      { code: 'DAPO', explanation: 'All Do As Possible' },
      { code: 'ETD', explanation: 'Estimated Time of Departure' },
      { code: 'FM', explanation: 'From' },
      { code: 'GRP', explanation: 'Group' },
      { code: 'HR', explanation: 'Hour' },
      { code: 'INFO', explanation: 'Inform' },
      { code: 'LCL', explanation: 'Local' },
      { code: 'MSG', explanation: 'Message' },
      { code: 'MT', explanation: 'My Telegram' },
      { code: 'NRC', explanation: 'No Record Pax' },
      { code: 'OBD', explanation: 'Onboard' },
      { code: 'PAX', explanation: 'Passenger' },
      { code: 'P/U', explanation: 'Pick Up' },
      { code: 'RCPT', explanation: 'Receipt' },
      { code: 'RPT', explanation: 'Repeat' },
      { code: 'SKI', explanation: 'Schedule' },
      { code: 'SBY', explanation: 'Stand By' },
      { code: 'STA', explanation: 'Scheduled Time of Arrival' },
      { code: 'STN', explanation: 'Station' },
      { code: 'TKT', explanation: 'Ticket' },
      { code: 'TWOV', explanation: 'Transit Without Visa' },
      { code: 'VIA', explanation: 'By Way Of' },
      { code: 'W/O', explanation: 'Without' },
      { code: 'YREND', explanation: 'Your End' },
      { code: 'STD', explanation: 'Scheduled Time of Dep' },
      { code: 'TKS', explanation: 'Thanks' },
      { code: 'TTL', explanation: 'Total' },
      { code: 'UNA', explanation: 'Unable' },
      { code: 'WX', explanation: 'Weather' },
      { code: 'XBAG', explanation: 'Excess Baggage' },
      { code: 'YT', explanation: 'Your Telex' }
    ];

    const STORAGE_KEY = 'telegram-code-practice-v1';
    const state = {
      current: null,
      mode: 'random',
      stats: {
        correct: 0,
        wrong: 0,
        manualWeak: {},
        wrongMap: {}
      }
    };

    const els = {
      questionText: document.getElementById('questionText'),
      answerInput: document.getElementById('answerInput'),
      feedback: document.getElementById('feedback'),
      answerReveal: document.getElementById('answerReveal'),
      totalCount: document.getElementById('totalCount'),
      modeText: document.getElementById('modeText'),
      correctCount: document.getElementById('correctCount'),
      wrongCount: document.getElementById('wrongCount'),
      manualWeakCount: document.getElementById('manualWeakCount'),
      systemWeakCount: document.getElementById('systemWeakCount'),
      weakList: document.getElementById('weakList'),
      modeSelect: document.getElementById('modeSelect')
    };

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.stats) {
          state.stats.correct = parsed.stats.correct || 0;
          state.stats.wrong = parsed.stats.wrong || 0;
          state.stats.manualWeak = parsed.stats.manualWeak || {};
          state.stats.wrongMap = parsed.stats.wrongMap || {};
          state.mode = parsed.mode || 'random';
        }
      } catch (e) {
        console.warn('loadState failed', e);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        mode: state.mode,
        stats: state.stats
      }));
    }

    function normalize(text) {
      return (text || '').trim().toUpperCase();
    }

    function getWeakPool(type = state.mode) {
      const manualCodes = Object.keys(state.stats.manualWeak).filter(code => state.stats.manualWeak[code]);
      const systemCodes = Object.entries(state.stats.wrongMap)
        .filter(([, count]) => count > 0)
        .sort((a, b) => b[1] - a[1])
        .map(([code]) => code);

      const allWeakCodes = [...new Set([...manualCodes, ...systemCodes])];
      if (type === 'manual') return DATA.filter(item => manualCodes.includes(item.code));
      if (type === 'weak') return DATA.filter(item => allWeakCodes.includes(item.code));
      return DATA;
    }

    function pickNextQuestion() {
      const pool = getWeakPool();
      const usablePool = pool.length ? pool : DATA;
      let next = usablePool[Math.floor(Math.random() * usablePool.length)];
      if (usablePool.length > 1 && state.current) {
        let guard = 0;
        while (next.code === state.current.code && guard < 10) {
          next = usablePool[Math.floor(Math.random() * usablePool.length)];
          guard++;
        }
      }
      state.current = next;
      els.questionText.textContent = next.explanation;
      els.answerInput.value = '';
      els.feedback.textContent = '';
      els.feedback.className = 'feedback';
      els.answerReveal.textContent = '';
      els.answerInput.focus();
      updateSummary();
      saveState();
    }

    function updateSummary() {
      els.totalCount.textContent = DATA.length;
      els.correctCount.textContent = state.stats.correct;
      els.wrongCount.textContent = state.stats.wrong;
      els.manualWeakCount.textContent = Object.keys(state.stats.manualWeak).filter(k => state.stats.manualWeak[k]).length;
      els.systemWeakCount.textContent = Object.values(state.stats.wrongMap).filter(v => v > 0).length;
      els.modeText.textContent = state.mode === 'random' ? '全部隨機' : state.mode === 'weak' ? '只練不熟題' : '只練手動加入的不熟題';
      els.modeSelect.value = state.mode;
      renderWeakList();
    }

    function renderWeakList() {
      const items = DATA
        .filter(item => (state.stats.manualWeak[item.code] || 0) || (state.stats.wrongMap[item.code] || 0) > 0)
        .sort((a, b) => {
          const scoreA = (state.stats.manualWeak[a.code] ? 1000 : 0) + (state.stats.wrongMap[a.code] || 0);
          const scoreB = (state.stats.manualWeak[b.code] ? 1000 : 0) + (state.stats.wrongMap[b.code] || 0);
          return scoreB - scoreA;
        });

      if (!items.length) {
        els.weakList.innerHTML = '<div class="muted">目前還沒有不熟題目。</div>';
        return;
      }

      els.weakList.innerHTML = items.map(item => {
        const wrongTimes = state.stats.wrongMap[item.code] || 0;
        const manual = !!state.stats.manualWeak[item.code];
        return `
          <div class="item">
            <div>
              <strong>${escapeHtml(item.explanation)} → ${escapeHtml(item.code)}</strong>
              <small>答錯 ${wrongTimes} 次${manual ? '・已手動加入' : ''}</small>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
              <button class="mini-btn btn-secondary" onclick="reviewItem('${jsEscape(item.code)}')">複習</button>
              <button class="mini-btn btn-ok" onclick="clearWeak('${jsEscape(item.code)}')">移除</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"]/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[s]));
    }

    function jsEscape(str) {
      return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function reviewItem(code) {
      const found = DATA.find(item => item.code === code);
      if (!found) return;
      state.current = found;
      els.questionText.textContent = found.explanation;
      els.answerInput.value = '';
      els.feedback.textContent = '';
      els.feedback.className = 'feedback';
      els.answerReveal.textContent = '';
      els.answerInput.focus();
      updateSummary();
    }

    window.reviewItem = reviewItem;

    function clearWeak(code) {
      delete state.stats.manualWeak[code];
      delete state.stats.wrongMap[code];
      updateSummary();
      saveState();
    }

    window.clearWeak = clearWeak;

    function markCurrentWeak() {
      if (!state.current) return;
      state.stats.manualWeak[state.current.code] = true;
      els.feedback.textContent = '已加入不熟題。';
      els.feedback.className = 'feedback bad';
      updateSummary();
      saveState();
    }

    function showAnswer() {
      if (!state.current) return;
      els.answerReveal.textContent = `答案：${state.current.code}`;
    }

    function submitAnswer() {
      if (!state.current) return;
      const userAnswer = normalize(els.answerInput.value);
      const correctAnswer = normalize(state.current.code);

      if (!userAnswer) {
        els.feedback.textContent = '請先輸入答案。';
        els.feedback.className = 'feedback bad';
        return;
      }

      if (userAnswer === correctAnswer) {
        state.stats.correct += 1;
        els.feedback.textContent = '答對了，準備進入下一題。';
        els.feedback.className = 'feedback ok';
        els.answerReveal.textContent = `正確答案：${correctAnswer}`;
        if (state.stats.wrongMap[correctAnswer]) {
          state.stats.wrongMap[correctAnswer] -= 1;
          if (state.stats.wrongMap[correctAnswer] <= 0 && !state.stats.manualWeak[correctAnswer]) {
            delete state.stats.wrongMap[correctAnswer];
          }
        }
        updateSummary();
        saveState();
        setTimeout(() => pickNextQuestion(), 550);
      } else {
        state.stats.wrong += 1;
        state.stats.wrongMap[correctAnswer] = (state.stats.wrongMap[correctAnswer] || 0) + 1;
        els.feedback.textContent = `答錯了，你輸入的是 ${userAnswer}。`;
        els.feedback.className = 'feedback bad';
        els.answerReveal.textContent = `正確答案：${correctAnswer}`;
        updateSummary();
        saveState();
        els.answerInput.select();
      }
    }

    document.getElementById('submitBtn').addEventListener('click', submitAnswer);
    document.getElementById('nextBtn').addEventListener('click', pickNextQuestion);
    document.getElementById('showAnswerBtn').addEventListener('click', showAnswer);
    document.getElementById('markWeakBtn').addEventListener('click', markCurrentWeak);
    document.getElementById('resetStatsBtn').addEventListener('click', () => {
      if (!confirm('確定要清除所有答題與不熟紀錄嗎？')) return;
      state.stats = { correct: 0, wrong: 0, manualWeak: {}, wrongMap: {} };
      updateSummary();
      saveState();
      pickNextQuestion();
    });

    els.modeSelect.addEventListener('change', (e) => {
      state.mode = e.target.value;
      updateSummary();
      saveState();
      pickNextQuestion();
    });

    els.answerInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitAnswer();
    });

    loadState();
    updateSummary();
    pickNextQuestion();
  </script>
</body>
</html>
